upstream backend{
    server app:8001;
}

upstream agk_user_service {
    server agk-user-server:8000;
}

upstream agk_object_equipment_service {
    server agk-object-equipment-server:8002;
}

server {
    listen 80;
    server_name _;

    location /api/users/ {
        proxy_pass http://agk_user_service/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/main/ {
        proxy_pass http://backend/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

     location /api/object_equipment/ {
        proxy_pass http://agk_object_equipment_service/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

version: "3.7"
services:
  web:
    container_name: nginx-python
    image: nginx:latest
    ports:
      - 8085:80
      - 8082:443
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - agk_tool_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_document
    ports:
      - 8001:8001
    command: [ "/app/docker/app.sh" ]
    env_file:
      - .env
    depends_on:
      - db-main
      - minio
    networks:
      - agk_tool_net

  db-main:
    image: postgres:latest
    container_name: db_aggreco
    restart: always
    command: ["postgres", "-p", "5435"]
    expose:
      - 5435
    ports:
      - 5435:5435
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres/pgdata:/var/lib/postgresql/data/pgdata
    networks:
      - agk_tool_net
    env_file:
      - .env

  pgadmin:
    container_name: pgadmin_document
    image: dpage/pgadmin4:latest
    restart: always
    depends_on:
      - db-main
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    networks:
      - agk_tool_net
    ports:
      - "5050:80"

  minio:
    container_name: files_s3
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    networks:
      - agk_tool_net
    env_file:
      - .env
    command: server --console-address ":9001" /data


networks:
  agk_tool_net:
    driver: bridge